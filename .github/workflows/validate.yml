name: Code Quality Check

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check required files exist
        run: |
          echo "Checking file structure..."
          required_files=(
            src/Code.js
            src/CaptionManager.js
            src/ListGenerator.js
            src/CrossRef.js
            src/Sidebar.html
            src/CrossRefSidebar.html
            src/appsscript.json
            package.json
            package-lock.json
            README.md
            .clasp.json.example
          )
          for file in "${required_files[@]}"; do
            test -f "$file" || { echo "Missing $file"; exit 1; }
          done
          echo "All required files present"

      - name: Validate appsscript.json
        run: |
          echo "Validating appsscript.json..."
          jq empty src/appsscript.json
          jq -e '.oauthScopes' src/appsscript.json > /dev/null
          jq -e '.runtimeVersion' src/appsscript.json > /dev/null
          echo "appsscript.json is valid"

      - name: Validate Apps Script source layout
        run: |
          echo "Validating Apps Script source layout..."
          test -d src
          js_count=$(find src -maxdepth 1 -name "*.js" | wc -l)
          if [ "$js_count" -lt 4 ]; then
            echo "Expected at least 4 .js files in src/"
            exit 1
          fi
          echo "Apps Script source layout OK"

      - name: Lint JavaScript files
        run: npm run lint

      - name: Validate HTML files
        run: npm run lint:html

      - name: Check Wordocs menu and sidebar structure
        run: |
          echo "Checking menu and sidebar integration..."
          grep -q "addSubMenu(captionMenu)" src/Code.js || \
            { echo "Caption submenu missing from Code.js"; exit 1; }
          grep -q "createTemplateFromFile('Sidebar')" src/Code.js || \
            { echo "Sidebar template opener missing from Code.js"; exit 1; }
          grep -q "insertListOfTablesFromSidebar" src/Code.js || \
            { echo "insertListOfTablesFromSidebar missing from Code.js"; exit 1; }
          grep -q "insertListOfFiguresFromSidebar" src/Code.js || \
            { echo "insertListOfFiguresFromSidebar missing from Code.js"; exit 1; }
          grep -q "updateListOfTablesFromSidebar" src/Code.js || \
            { echo "updateListOfTablesFromSidebar missing from Code.js"; exit 1; }
          grep -q "updateListOfFiguresFromSidebar" src/Code.js || \
            { echo "updateListOfFiguresFromSidebar missing from Code.js"; exit 1; }
          grep -q "autoRenumberIfNeeded" src/CaptionManager.js || \
            { echo "autoRenumberIfNeeded missing from CaptionManager.js"; exit 1; }
          ! grep -q "Update All Numbering" src/Code.js || \
            { echo "Update All Numbering menu item should be removed from Code.js"; exit 1; }
          grep -q "updateAllListsOfTables" src/ListGenerator.js || \
            { echo "updateAllListsOfTables missing from ListGenerator.js"; exit 1; }
          grep -q "updateAllListsOfFigures" src/ListGenerator.js || \
            { echo "updateAllListsOfFigures missing from ListGenerator.js"; exit 1; }
          grep -q "resolveCursorInsertLocation" src/ListGenerator.js || \
            { echo "resolveCursorInsertLocation missing from ListGenerator.js"; exit 1; }
          grep -q "isRealCaptionParagraph" src/ListGenerator.js || \
            { echo "isRealCaptionParagraph missing from ListGenerator.js"; exit 1; }
          grep -q "updateList()" src/Sidebar.html || \
            { echo "updateList missing from Sidebar.html"; exit 1; }
          grep -q "<?= mode ?>" src/Sidebar.html || \
            { echo "Sidebar mode template variable missing"; exit 1; }
          grep -q "getDefaultCaptionStyle" src/CaptionManager.js || \
            { echo "getDefaultCaptionStyle missing from CaptionManager.js"; exit 1; }
          grep -q "getCaptionStyleForSidebar" src/Code.js || \
            { echo "getCaptionStyleForSidebar missing from Code.js"; exit 1; }
          grep -q "applyCaptionStyleToAllFromSidebar" src/Code.js || \
            { echo "applyCaptionStyleToAllFromSidebar missing from Code.js"; exit 1; }
          grep -q "format-toolbar" src/Sidebar.html || \
            { echo "format-toolbar missing from Sidebar.html"; exit 1; }
          grep -q "showCrossRefSidebar" src/Code.js || \
            { echo "showCrossRefSidebar missing from Code.js"; exit 1; }
          grep -q "createTemplateFromFile('CrossRefSidebar')" src/Code.js || \
            { echo "CrossRefSidebar template opener missing from Code.js"; exit 1; }
          grep -q "getCrossRefTargetsForSidebar" src/Code.js || \
            { echo "getCrossRefTargetsForSidebar missing from Code.js"; exit 1; }
          grep -q "insertCrossRefFromSidebar" src/Code.js || \
            { echo "insertCrossRefFromSidebar missing from Code.js"; exit 1; }
          grep -q "getTargets" src/CrossRef.js || \
            { echo "getTargets missing from CrossRef.js"; exit 1; }
          grep -q 'id="ref-type"' src/CrossRefSidebar.html || \
            { echo "CrossRefSidebar.html missing ref-type control"; exit 1; }
          grep -q "renumberCaptionNumberInPlace" src/CaptionManager.js || \
            { echo "renumberCaptionNumberInPlace missing from CaptionManager.js"; exit 1; }
          grep -q "paragraphStructuralKey" src/CaptionManager.js || \
            { echo "paragraphStructuralKey missing from CaptionManager.js"; exit 1; }
          echo "Menu and sidebar structure OK"

      - name: Check for common issues
        run: |
          echo "Checking for common code issues..."
          if grep -r "console\.log" src/*.js 2>/dev/null; then
            echo "Found console.log - use Logger.log in Apps Script"
            exit 1
          fi
          if grep -r "debugger" src/ 2>/dev/null; then
            echo "Found debugger statements"
            exit 1
          fi
          if grep -rE "(password|secret|api[_-]?key)\s*=\s*['\"]" src/ 2>/dev/null; then
            echo "Possible hardcoded credentials found"
            exit 1
          fi
          echo "No common issues found"

      - name: Check file sizes
        run: |
          echo "Checking file sizes (Apps Script 50KB limit per file)..."
          find src \( -name "*.js" -o -name "*.html" \) | while read -r file; do
            SIZE_KB=$(($(wc -c < "$file") / 1024))
            if [ "$SIZE_KB" -gt 45 ]; then
              echo "WARNING: $file is ${SIZE_KB}KB (close to 50KB limit)"
            fi
          done
          echo "File size check complete"

      - name: Check documentation files
        run: |
          echo "Checking documentation..."
          test -f docs/INSTALLATION.md
          test -f docs/DEVELOPMENT.md
          test -f docs/CONTRIBUTING.md
          echo "Documentation files present"

      - name: All checks passed
        run: |
          echo "ALL VALIDATION CHECKS PASSED"
          echo "Code is ready for review."
