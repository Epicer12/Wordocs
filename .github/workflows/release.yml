name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Wordocs release

            Google Docs add-on for professional captions, lists, and numbering.

            ### Features
            - **Wordocs > Caption** submenu for table and figure captions
            - **List of Tables** and **List of Figures** from the caption sidebars
            - Automatic caption numbering with **Update All Numbering**
            - Cross-reference helpers for tables and figures

            ### Installation
            See the [Installation Guide](https://github.com/Epicer12/Wordocs/blob/main/docs/INSTALLATION.md).

            ### Development
            ```bash
            npm install
            npx clasp login
            npm run push
            ```
